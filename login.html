<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Portal — Capavista Cave House</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

<!-- Background -->
<div class="login-bg"></div>

<!-- Floating orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Particles container -->
<div class="particles" id="particles"></div>

<!-- Login Container -->
<div class="login-container">
  <div class="login-card" style="position:relative">

    <!-- Corner decorations -->
    <div class="card-deco card-deco-tl"></div>
    <div class="card-deco card-deco-br"></div>

    <!-- Brand -->
    <div class="login-brand">
      <div class="brand-emblem">
        <!-- Cave/diamond icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 9l3 11h14l3-11L12 2z" fill="none" stroke="#C4965A" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M2 9h20M12 2l4 7H8l4-7z" fill="none" stroke="#C4965A" stroke-width="1.2" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="brand-name">Capavista</div>
      <div class="brand-sub">Cave House · Management Portal</div>
    </div>

    <!-- Header -->
    <div class="login-header">
      <h2>Welcome Back</h2>
      <p>Sign in to your private dashboard</p>
    </div>

    <!-- Error message -->
    <div class="login-error" id="loginError">
      Invalid credentials. Please try again.
    </div>

    <!-- Form -->
    <form class="login-form" id="loginForm" autocomplete="off">

      <div class="form-field">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter your username"
          autocomplete="username"
          spellcheck="false"
        />
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••••"
          autocomplete="current-password"
        />
        <button type="button" class="toggle-pwd" id="togglePwd" aria-label="Toggle password visibility">
          <!-- Eye icon -->
          <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="eyeClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <div class="form-options">
        <label class="remember-label">
          <input type="checkbox" id="rememberMe" />
          <span class="custom-check">
            <svg viewBox="0 0 10 8"><polyline points="1,4 4,7 9,1"/></svg>
          </span>
          Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-signin" id="submitBtn">
        <span class="btn-text">Sign In</span>
        <div class="btn-loader">
          <div class="spinner"></div>
        </div>
      </button>

    </form>

    <!-- Footer -->
    <div class="login-footer">
      <a href="index.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Return to Website
      </a>
    </div>

  </div>
</div>

<script>
// ── Particles ──────────────────────────────────────────
(function() {
  const container = document.getElementById('particles');
  const count = 28;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${Math.random() * 2 + 1}px;
      height: ${Math.random() * 2 + 1}px;
      animation-duration: ${Math.random() * 12 + 8}s;
      animation-delay: ${Math.random() * -15}s;
      opacity: ${Math.random() * 0.5 + 0.1};
    `;
    container.appendChild(p);
  }
})();

// ── Password toggle ────────────────────────────────────
document.getElementById('togglePwd').addEventListener('click', function() {
  const pwd = document.getElementById('password');
  const open = document.getElementById('eyeOpen');
  const closed = document.getElementById('eyeClosed');
  if (pwd.type === 'password') {
    pwd.type = 'text';
    open.style.display = 'none';
    closed.style.display = 'block';
  } else {
    pwd.type = 'password';
    open.style.display = 'block';
    closed.style.display = 'none';
  }
});

// ── Login form ─────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const error = document.getElementById('loginError');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  // Hide previous error
  error.classList.remove('show');

  // Show loading
  btn.classList.add('loading');
  btn.disabled = true;

  // Simulate auth (replace with real auth logic)
  setTimeout(function() {
    // Demo credentials: admin / capavista2024
    if (username === 'admin' && password === 'capavista2024') {
      // Store session
      sessionStorage.setItem('cv_admin', 'true');
      sessionStorage.setItem('cv_user', username);
      // Redirect to dashboard
      window.location.href = 'dashboard.html';
    } else {
      btn.classList.remove('loading');
      btn.disabled = false;
      error.classList.add('show');
      // Shake inputs
      document.getElementById('username').style.animation = 'none';
      document.getElementById('password').style.animation = 'none';
    }
  }, 1200);
});

// ── Keyboard: focus effects ────────────────────────────
document.querySelectorAll('.form-field input').forEach(function(input) {
  input.addEventListener('focus', function() {
    this.closest('.form-field').querySelector('label').style.color = '#E8C99A';
  });
  input.addEventListener('blur', function() {
    this.closest('.form-field').querySelector('label').style.color = '#C4965A';
  });
});
</script>

</body>
</html>
